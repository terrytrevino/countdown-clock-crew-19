<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Countdown to July 9, 2026</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: transparent;
    }
    body {
      margin: 0;
      padding: 24px;
      display: grid;
      place-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .timer-card {
      width: min(720px, 100%);
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
      background: #ffffff;
      text-align: center;
    }
    .eyebrow {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 22px;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.1;
    }
    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .unit {
      border-radius: 18px;
      background: #f9fafb;
      padding: 18px 10px;
    }
    .value {
      display: block;
      font-size: clamp(32px, 7vw, 64px);
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .label {
      display: block;
      margin-top: 8px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .footer {
      margin: 22px 0 0;
      color: #6b7280;
      font-size: 14px;
    }
    @media (max-width: 520px) {
      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }
      body {
        padding: 12px;
      }
      .timer-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="timer-card" aria-live="polite">
    <p class="eyebrow">Team Countdown</p>
    <h1>Time until July 9, 2026</h1>

    <section class="countdown" aria-label="Countdown timer">
      <div class="unit"><span class="value" id="days">--</span><span class="label">Days</span></div>
      <div class="unit"><span class="value" id="hours">--</span><span class="label">Hours</span></div>
      <div class="unit"><span class="value" id="minutes">--</span><span class="label">Minutes</span></div>
      <div class="unit"><span class="value" id="seconds">--</span><span class="label">Seconds</span></div>
    </section>

    <p class="footer" id="status">Target: July 9, 2026 at 12:00 AM local time</p>
  </main>

  <script>
    // Change this if you want a specific time or timezone.
    // Current target is July 9, 2026 at 12:00 AM in each viewer's local timezone.
    const target = new Date(2026, 6, 9, 0, 0, 0);

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const statusEl = document.getElementById("status");

    function updateCountdown() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        daysEl.textContent = "0";
        hoursEl.textContent = "0";
        minutesEl.textContent = "0";
        secondsEl.textContent = "0";
        statusEl.textContent = "It’s July 9, 2026!";
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = days;
      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
