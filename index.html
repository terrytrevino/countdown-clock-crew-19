<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Countdown to July 9, 2026</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #0b1020;
    }

    body {
      margin: 0;
      padding: 24px;
      display: grid;
      place-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.32), transparent 32rem),
        linear-gradient(180deg, #07111f 0%, #111827 60%, #111827 100%);
      overflow-x: hidden;
    }

    .timer-card {
      width: min(860px, 100%);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
      background: rgba(255, 255, 255, 0.94);
      text-align: center;
      box-sizing: border-box;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.1;
    }

    .scene {
      position: relative;
      height: 310px;
      margin: 8px auto 24px;
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 18%, rgba(255,255,255,0.92) 0 1px, transparent 2px),
        radial-gradient(circle at 35% 10%, rgba(255,255,255,0.72) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 22%, rgba(255,255,255,0.7) 0 1px, transparent 2px),
        linear-gradient(180deg, #0f172a 0%, #1f2937 58%, #374151 59%, #111827 100%);
    }

    .moon {
      position: absolute;
      width: 58px;
      height: 58px;
      right: 54px;
      top: 38px;
      border-radius: 50%;
      background: #f9fafb;
      box-shadow: 0 0 34px rgba(255,255,255,0.5);
      opacity: 0.95;
    }

    .pad {
      position: absolute;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%);
      width: 220px;
      height: 22px;
      border-radius: 10px;
      background: #6b7280;
      box-shadow: 0 10px 0 #374151;
    }

    .tower {
      position: absolute;
      left: calc(50% - 132px);
      bottom: 58px;
      width: 18px;
      height: 190px;
      background: repeating-linear-gradient(
        45deg,
        #64748b,
        #64748b 7px,
        #334155 7px,
        #334155 14px
      );
      border-radius: 6px;
    }

    .arm {
      position: absolute;
      left: calc(50% - 126px);
      bottom: 178px;
      width: 94px;
      height: 12px;
      background: #64748b;
      border-radius: 999px;
      transform: rotate(-8deg);
      transform-origin: left center;
    }

    .rocket {
      position: absolute;
      left: 50%;
      bottom: 62px;
      width: 82px;
      height: 190px;
      transform: translateX(-50%);
      transition: transform 1s ease-in, opacity 0.8s ease;
      z-index: 4;
    }

    .nose {
      width: 0;
      height: 0;
      margin: 0 auto;
      border-left: 41px solid transparent;
      border-right: 41px solid transparent;
      border-bottom: 54px solid #ef4444;
    }

    .body {
      width: 82px;
      height: 112px;
      margin: 0 auto;
      background: linear-gradient(90deg, #e5e7eb, #ffffff 45%, #cbd5e1);
      border-radius: 12px 12px 22px 22px;
      position: relative;
      box-shadow: inset -10px 0 0 rgba(15, 23, 42, 0.08);
    }

    .window {
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #60a5fa;
      border: 5px solid #1e293b;
      box-sizing: border-box;
    }

    .stripe {
      position: absolute;
      left: 0;
      right: 0;
      top: 70px;
      height: 13px;
      background: #ef4444;
    }

    .fin {
      position: absolute;
      bottom: 4px;
      width: 28px;
      height: 48px;
      background: #ef4444;
      z-index: -1;
    }

    .fin.left {
      left: -18px;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .fin.right {
      right: -18px;
      clip-path: polygon(0 0, 100% 100%, 0 100%);
    }

    .engine {
      width: 34px;
      height: 18px;
      margin: 0 auto;
      background: #111827;
      border-radius: 0 0 14px 14px;
    }

    .steam {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: 300px;
      height: 92px;
      z-index: 3;
      opacity: 0.92;
    }

    .cloud {
      position: absolute;
      bottom: 0;
      border-radius: 50%;
      background: rgba(229, 231, 235, 0.92);
      filter: blur(1px);
      animation: steamPulse 2.2s ease-in-out infinite alternate;
    }

    .cloud:nth-child(1) { width: 86px; height: 52px; left: 24px; bottom: 10px; animation-delay: 0s; }
    .cloud:nth-child(2) { width: 118px; height: 66px; left: 82px; bottom: 2px; animation-delay: .25s; }
    .cloud:nth-child(3) { width: 92px; height: 54px; left: 178px; bottom: 8px; animation-delay: .5s; }
    .cloud:nth-child(4) { width: 70px; height: 44px; left: 132px; bottom: 42px; animation-delay: .75s; opacity: .8; }
    .cloud:nth-child(5) { width: 66px; height: 42px; left: 62px; bottom: 46px; animation-delay: 1s; opacity: .7; }

    .flame {
      position: absolute;
      left: 50%;
      bottom: 26px;
      width: 42px;
      height: 74px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #fef3c7, #f97316, #dc2626);
      border-radius: 50% 50% 44% 44%;
      clip-path: polygon(50% 0, 82% 30%, 70% 100%, 50% 78%, 30% 100%, 18% 30%);
      opacity: 0;
      z-index: 2;
      animation: flicker .18s infinite alternate;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .unit {
      border-radius: 18px;
      background: #f9fafb;
      padding: 18px 10px;
    }

    .value {
      display: block;
      font-size: clamp(32px, 7vw, 64px);
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .label {
      display: block;
      margin-top: 8px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .footer {
      margin: 22px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .launched .rocket {
      transform: translate(-50%, -430px);
      opacity: 0;
    }

    .launched .flame {
      opacity: 1;
    }

    .launched .steam {
      transform: translateX(-50%) scale(1.3);
      opacity: 1;
    }

    .launched .launch-message {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .launch-message {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(.92);
      opacity: 0;
      z-index: 8;
      color: white;
      text-shadow: 0 8px 24px rgba(0,0,0,.55);
      transition: all .8s ease;
      font-weight: 900;
      font-size: clamp(34px, 7vw, 86px);
      letter-spacing: .04em;
    }

    @keyframes steamPulse {
      from { transform: translateY(0) scale(1); opacity: .7; }
      to { transform: translateY(-10px) scale(1.14); opacity: .96; }
    }

    @keyframes flicker {
      from { transform: translateX(-50%) scaleY(.92) scaleX(.95); }
      to { transform: translateX(-50%) scaleY(1.12) scaleX(1.04); }
    }

    @media (max-width: 560px) {
      body { padding: 12px; }
      .timer-card { padding: 18px; }
      .scene { height: 280px; }
      .countdown { grid-template-columns: repeat(2, 1fr); }
      .tower, .arm { display: none; }
    }
  </style>
</head>
<body>
  <main class="timer-card" aria-live="polite">
    <p class="eyebrow">Mission Countdown</p>
    <h1>Time until July 9, 2026</h1>

    <section class="scene" id="scene" aria-label="Rocket on launch pad with steam">
      <div class="moon"></div>

      <div class="tower"></div>
      <div class="arm"></div>

      <div class="rocket" aria-hidden="true">
        <div class="nose"></div>
        <div class="body">
          <div class="window"></div>
          <div class="stripe"></div>
          <div class="fin left"></div>
          <div class="fin right"></div>
        </div>
        <div class="engine"></div>
      </div>

      <div class="flame"></div>

      <div class="steam" aria-hidden="true">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
      </div>

      <div class="pad"></div>
      <div class="launch-message">LAUNCH</div>
    </section>

    <section class="countdown" aria-label="Countdown timer">
      <div class="unit"><span class="value" id="days">--</span><span class="label">Days</span></div>
      <div class="unit"><span class="value" id="hours">--</span><span class="label">Hours</span></div>
      <div class="unit"><span class="value" id="minutes">--</span><span class="label">Minutes</span></div>
      <div class="unit"><span class="value" id="seconds">--</span><span class="label">Seconds</span></div>
    </section>

    <p class="footer" id="status">Target: July 9, 2026 at 12:00 AM Pacific Time</p>
  </main>

  <script>
    // Fixed milestone: July 9, 2026 at 12:00 AM Pacific Time.
    // This gives every viewer the same exact countdown moment worldwide.
    const target = new Date("2026-07-09T00:00:00-07:00");

    const sceneEl = document.getElementById("scene");
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const statusEl = document.getElementById("status");

    function updateCountdown() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        daysEl.textContent = "0";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        statusEl.textContent = "Launch day has arrived.";
        sceneEl.classList.add("launched");
        return;
      }

      sceneEl.classList.remove("launched");

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = days;
      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
